name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: |
            package-lock.json
            react-sway/package-lock.json
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (required for trusted publishing)
        run: npm install -g npm@latest

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install root dependencies
        run: npm ci

      - name: Install react-sway dependencies
        run: cd react-sway && npm ci

      - name: Build react-sway
        run: cd react-sway && npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: cd react-sway && npm test

      - name: Publish with trusted publishing (OIDC)
        run: cd react-sway && npm publish --provenance --access public
